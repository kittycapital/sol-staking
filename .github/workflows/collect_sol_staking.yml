name: Collect SOL Staking Data

on:
  schedule:
    # 하루 1회 실행 (UTC 00:00 = KST 09:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas

      - name: Collect Solana staking data
        env:
          # Free RPC - can be replaced with Helius/QuickNode for reliability
          SOLANA_RPC_URL: https://api.mainnet-beta.solana.com
        run: python3 collect_sol_staking.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sol_staking_data.json
          git diff --staged --quiet || git commit -m "📊 SOL staking data update $(date -u +%Y-%m-%d_%H:%M)"
          git push
