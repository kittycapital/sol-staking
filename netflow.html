<style>
:root {
  --hv-primary:#3b82f6;--hv-primary-light:#60a5fa;--hv-primary-dark:#2563eb;
  --hv-primary-glow:rgba(59,130,246,0.12);
  --hv-up:#22c55e;--hv-up-bg:rgba(34,197,94,0.1);
  --hv-down:#ef4444;--hv-down-bg:rgba(239,68,68,0.1);
  --hv-warning:#f59e0b;--hv-warning-bg:rgba(245,158,11,0.1);
  --hv-neutral:#6b7280;
  --hv-bg-base:#000;--hv-bg-surface:#0a0a0a;--hv-bg-card:#111;
  --hv-bg-card-hover:#181818;--hv-bg-elevated:#1a1a1a;
  --hv-text-primary:#e5e5e5;--hv-text-secondary:#8a8a8a;
  --hv-text-tertiary:#555;--hv-text-muted:#3a3a3a;
  --hv-border:rgba(255,255,255,0.06);--hv-border-strong:rgba(255,255,255,0.12);
  --hv-font-display:'Plus Jakarta Sans',sans-serif;
  --hv-font-body:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  --hv-font-mono:'JetBrains Mono','SF Mono',monospace;
  --hv-space-xs:8px;--hv-space-sm:12px;--hv-space-md:16px;
  --hv-space-lg:24px;--hv-space-xl:32px;
  --hv-radius-sm:6px;--hv-radius-md:10px;--hv-radius-lg:14px;
  --hv-shadow-sm:0 1px 3px rgba(0,0,0,.5);--hv-shadow-lg:0 8px 32px rgba(0,0,0,.7);
  --hv-transition-fast:150ms ease;--hv-transition:250ms ease;
  --hv-max-width:1280px;--hv-header-height:56px;
  --blue:#4a9eff;--cyan:#00e5cc;--red:#ff4a6a;--orange:#ff8c42;
  --yellow:#ffd642;--green:#42ff8c;--purple:#a855f7;--sol:#9945ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{font-family:var(--hv-font-body);background:var(--hv-bg-base);color:var(--hv-text-primary);line-height:1.6;min-height:100vh;overflow-x:hidden}
a{color:var(--hv-primary-light);text-decoration:none}
::selection{background:var(--sol);color:#fff}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--hv-bg-base)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.hv-header{position:sticky;top:0;z-index:100;height:var(--hv-header-height);background:rgba(0,0,0,.9);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--hv-border);display:flex;align-items:center;padding:0 var(--hv-space-lg)}
.hv-header-inner{width:100%;max-width:var(--hv-max-width);margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
.hv-header-center{display:flex;flex-direction:column;align-items:center;text-align:center;min-width:0}
.hv-header-center h1{font-family:var(--hv-font-display);font-size:1.3rem;font-weight:600;color:var(--hv-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hv-header-category{font-size:.7rem;color:var(--hv-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.hv-header-right{display:flex;align-items:center;justify-content:flex-end;gap:var(--hv-space-xs);flex-shrink:0}
.hv-update-badge{font-family:var(--hv-font-mono);font-size:.688rem;color:var(--hv-text-tertiary);white-space:nowrap;display:flex;align-items:center;gap:6px}
.hv-live-dot{width:5px;height:5px;background:var(--sol);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.hv-page{max-width:var(--hv-max-width);margin:0 auto;padding:var(--hv-space-lg)}
.dash-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.card{background:var(--hv-bg-card);border:1px solid var(--hv-border);border-radius:var(--hv-radius-lg);padding:18px 20px 16px;position:relative;overflow:visible;animation:fadeUp .5s ease both}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-label{font-family:var(--hv-font-mono);font-size:10px;font-weight:500;color:var(--hv-text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;text-align:center}
.card-title{font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;justify-content:center;gap:7px}
.card-desc{font-size:11.5px;color:var(--hv-text-secondary);margin-bottom:14px;line-height:1.5;text-align:center}

.s12{grid-column:span 12}.s8{grid-column:span 8}.s7{grid-column:span 7}
.s6{grid-column:span 6}.s5{grid-column:span 5}.s4{grid-column:span 4}

.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.tab{padding:5px 12px;border-radius:6px;font-family:var(--hv-font-mono);font-size:10.5px;font-weight:500;color:var(--hv-text-muted);background:transparent;border:1px solid transparent;cursor:pointer;transition:all .2s;user-select:none}
.tab:hover{color:var(--hv-text-secondary);background:rgba(255,255,255,.03)}
.tab.active{color:var(--sol);background:rgba(153,69,255,.08);border-color:rgba(153,69,255,.2)}

.chart-wrap{position:relative;width:100%;height:420px}
.chart-wrap canvas{width:100%!important;height:100%!important}

/* INFLECTION LIST */
.inflection-list{max-height:400px;overflow-y:auto}
.inflection-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--hv-border)}
.inflection-item:last-child{border-bottom:none}
.inflection-item:hover{background:var(--hv-bg-card-hover)}
.inflection-date{font-family:var(--hv-font-mono);color:var(--hv-text-primary);font-size:12px;font-weight:500}
.inflection-value{font-family:var(--hv-font-mono);color:var(--hv-text-secondary);font-size:11px;margin-top:2px}
.inflection-badge{font-family:var(--hv-font-mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px}
.badge-inflow{background:rgba(66,255,140,.08);color:var(--green);border:1px solid rgba(66,255,140,.15)}
.badge-outflow{background:rgba(255,74,106,.08);color:var(--red);border:1px solid rgba(255,74,106,.15)}
.loading{text-align:center;padding:32px;color:var(--hv-text-muted);font-size:13px}

/* SHARE BAR */
.share-bar{display:flex;align-items:center;justify-content:space-between;padding:12px var(--hv-space-lg);border-top:1px solid var(--hv-border);background:var(--hv-bg-surface);border-radius:0 0 var(--hv-radius-lg) var(--hv-radius-lg)}
.share-bar-preview{font-size:.75rem;color:var(--hv-text-tertiary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%;line-height:1.4;font-family:var(--hv-font-mono)}
.share-bar-preview span{color:var(--hv-text-secondary);font-weight:500}
.share-bar-buttons{display:flex;align-items:center;gap:6px;flex-shrink:0}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:.75rem;font-weight:600;font-family:var(--hv-font-body);cursor:pointer;transition:all var(--hv-transition-fast);border:1px solid var(--hv-border-strong);background:var(--hv-bg-card);color:#999;white-space:nowrap}
.share-btn:hover{transform:translateY(-1px);box-shadow:var(--hv-shadow-sm);color:var(--hv-text-primary)}
.share-btn svg{flex-shrink:0}
.share-btn--x:hover{border-color:#fff;color:#fff;background:#111}
.share-btn--kakao:hover{border-color:#FEE500;color:#191919;background:#FEE500}
.share-btn--tg:hover{border-color:#26A5E4;color:#fff;background:rgba(38,165,228,.15)}
.share-btn--ig:hover{border-color:#E4405F;color:#fff;background:rgba(228,64,95,.15)}
.share-btn--copy:hover{border-color:var(--sol);color:var(--sol);background:rgba(153,69,255,.1)}

.error-msg{background:rgba(255,74,106,.06);border:1px solid rgba(255,74,106,.15);color:var(--red);padding:14px 20px;border-radius:var(--hv-radius-md);margin-bottom:14px;font-size:13px}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--hv-bg-elevated);border:1px solid var(--hv-border-strong);border-radius:var(--hv-radius-md);padding:10px 18px;font-size:.788rem;color:var(--hv-text-primary);box-shadow:var(--hv-shadow-lg);animation:toastIn .3s ease;border-left:3px solid var(--sol)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1024px){.s8,.s7,.s6,.s5,.s4{grid-column:span 12}}
@media(max-width:768px){
  :root{--hv-header-height:52px}
  .hv-page{padding:var(--hv-space-md)}
  .hv-header{padding:0 var(--hv-space-md)}
  .hv-update-badge{display:none}
  .hv-header-center h1{font-size:1.1rem}
  .dash-grid{gap:10px}
  .card{padding:14px 14px 12px}
  .card-title{font-size:14px}
  .chart-wrap{height:340px}
  .share-bar{flex-direction:column;gap:10px;align-items:stretch}
  .share-bar-preview{max-width:100%}
  .share-bar-buttons{justify-content:center;flex-wrap:wrap}
  .share-btn span.label-text{display:none}
  .share-btn{padding:8px 10px}
}
@media(max-width:520px){.hv-page{padding:12px 10px 24px}.chart-wrap{height:300px}}
@media(max-width:380px){.hv-header-center h1{font-size:1rem}}
</style>
</head>

<script>
var SHARE_URL='https://herdvibe.com/101';
var SHARE_TITLE='SOL Net Flow & 변곡점 분석';
var SHARE_DESC='Solana Net Staking Flow 및 주요 변곡점 — 매도/매수 전환 신호';
var OG_IMAGE='https://raw.githubusercontent.com/kittycapital/kittycapital.github.io/main/assets/herdvibe-og.png';

function ensureKakao(){try{if(typeof Kakao!=='undefined'&&!Kakao.isInitialized())Kakao.init('a43ed7b39fac35458f4f9df925a279b5');return typeof Kakao!=='undefined'&&Kakao.isInitialized();}catch(e){return false;}}
ensureKakao();
function kakaoShare(){if(!ensureKakao()){copyToClipboard(SHARE_URL);toast('링크 복사완료! 카카오톡에 붙여넣기 하세요');return;}try{Kakao.Share.sendDefault({objectType:'feed',content:{title:SHARE_TITLE,description:SHARE_DESC,imageUrl:OG_IMAGE,link:{mobileWebUrl:SHARE_URL,webUrl:SHARE_URL}},buttons:[{title:'대시보드 보기',link:{mobileWebUrl:SHARE_URL,webUrl:SHARE_URL}}]});}catch(e){copyToClipboard(SHARE_URL);toast('링크 복사완료! 카카오톡에 붙여넣기 하세요');}}
function copyToClipboard(text){try{window.parent.postMessage({type:'clipboard',text:text},'*');}catch(e){}try{navigator.clipboard.writeText(text);}catch(e){}}
function flashCopied(btn){if(!btn)return;var orig=btn.innerHTML;btn.style.background='#9945ff';btn.style.color='#fff';btn.style.borderColor='#9945ff';var hasLabel=btn.querySelector('.label-text');btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>'+(hasLabel?'<span class="label-text" style="color:#fff">복사됨!</span>':'');setTimeout(function(){btn.style.background='';btn.style.color='';btn.style.borderColor='';btn.innerHTML=orig;},2000);}
function doShare(p,btn){var u=SHARE_URL;var t=encodeURIComponent(SHARE_TITLE+' | herdvibe.com');var eu=encodeURIComponent(u);switch(p){case'twitter':window.open('https://twitter.com/intent/tweet?text='+t+'&url='+eu,'_blank');break;case'telegram':window.open('https://t.me/share/url?url='+eu+'&text='+t,'_blank');break;case'kakao':kakaoShare();break;case'instagram':copyToClipboard(u);flashCopied(btn);toast('링크 복사완료! 인스타그램에 붙여넣기 하세요');break;case'link':copyToClipboard(u);flashCopied(btn);toast('링크가 복사되었습니다 ✓');break;}}
function toast(msg){var c=document.querySelector('.toast-wrap');if(!c){c=document.createElement('div');c.className='toast-wrap';document.body.appendChild(c);}var t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(12px)';t.style.transition='.3s';setTimeout(function(){t.remove();},300);},3000);}

/* ===== WATERMARK ===== */
var watermarkPlugin={id:'herdvibeWatermark',beforeDraw:function(ch){var ctx=ch.ctx,ca=ch.chartArea;if(!ca)return;ctx.save();ctx.font='700 28px "Plus Jakarta Sans",sans-serif';ctx.fillStyle='rgba(255,255,255,0.03)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Herdvibe.com',(ca.left+ca.right)/2,(ca.top+ca.bottom)/2);ctx.restore()}};
Chart.register(watermarkPlugin);

Chart.defaults.font.family="'JetBrains Mono','Noto Sans KR',monospace";
Chart.defaults.font.size=10;Chart.defaults.color='#3a3a52';
Chart.defaults.plugins.legend.display=true;
Chart.defaults.elements.point.radius=0;Chart.defaults.elements.point.hoverRadius=4;
Chart.defaults.elements.line.borderWidth=2;Chart.defaults.animation.duration=600;
Chart.defaults.responsive=true;Chart.defaults.maintainAspectRatio=false;
var gridColor='rgba(255,255,255,0.04)';
var baseScaleOpts={grid:{color:gridColor,drawBorder:false},ticks:{maxTicksLimit:8,padding:6,font:{size:9}}};
var COLORS={cyan:'#00e5cc',green:'#42ff8c',red:'#ff4a6a',blue:'#4a9eff',sol:'#9945ff'};

var DATA=null,netFlowChart=null,flowRange='365';

function mergePrices(d){
  if(!d||!d.data)return;
  var hasPrice=d.data.some(function(x){return x.solPrice>1;});
  if(!hasPrice){
    d.data.forEach(function(x){x.solPrice=_PRICE_MAP[x.date]||0;});
  }
}

async function loadData(){
  try{
    var r;
    try{r=await fetch('./data/sol_staking_data.json');}catch(e){}
    if(r&&r.ok){DATA=await r.json();mergePrices(DATA);}else{DATA=_EMBEDDED_DATA;}
    updateInflectionPoints();updateNetFlowChart();
    if(DATA.meta&&DATA.meta.lastUpdated)document.getElementById('lastUpdated').textContent=DATA.meta.lastUpdated;
  }catch(e){
    DATA=_EMBEDDED_DATA;updateInflectionPoints();updateNetFlowChart();
    if(DATA.meta&&DATA.meta.lastUpdated)document.getElementById('lastUpdated').textContent=DATA.meta.lastUpdated;
  }
}

function updateInflectionPoints(){
  if(!DATA)return;var container=document.getElementById('inflectionList');
  var points=DATA.inflectionPoints||[];
  if(points.length===0){container.innerHTML='<div class="loading">변곡점 데이터 없음</div>';return;}
  container.innerHTML=points.slice(-15).reverse().map(function(pt){
    var isInflow=pt.type==='peak_inflow';
    return '<div class="inflection-item"><div><div class="inflection-date">'+pt.date+'</div><div class="inflection-value">Net: '+(pt.netFlow>=0?'+':'')+formatNumber(pt.netFlow)+' SOL '+(pt.solPrice?'@ $'+pt.solPrice.toLocaleString():'')+'</div></div><span class="inflection-badge '+(isInflow?'badge-inflow':'badge-outflow')+'">'+(isInflow?'▲ INFLOW':'▼ OUTFLOW')+'</span></div>';
  }).join('');
  sendHeight();
}

function getFilteredData(range){
  if(!DATA||!DATA.data)return[];if(range==='all')return DATA.data;
  var days=parseInt(range),cut=new Date();cut.setDate(cut.getDate()-days);
  var start=cut.toISOString().split('T')[0];return DATA.data.filter(function(d){return d.date>=start;});
}

function updateNetFlowChart(){
  var fd=getFilteredData(flowRange);
  var labels=fd.map(function(d){return d.date;});
  var netFlowData=fd.map(function(d){return d.netFlow;});
  var priceData=fd.map(function(d){return d.solPrice;});
  var hasPrice=priceData.some(function(p){return p>0;});
  if(netFlowChart)netFlowChart.destroy();

  var positiveData=netFlowData.map(function(v){return v>=0?v:0;});
  var negativeData=netFlowData.map(function(v){return v<0?v:0;});

  var ds=[
    {label:'순유입 (Activating > Deactivating)',data:positiveData,borderColor:COLORS.green,backgroundColor:'rgba(66,255,140,0.15)',fill:'origin',yAxisID:'y',tension:0.3,pointRadius:0,borderWidth:1.5},
    {label:'순유출 (Deactivating > Activating)',data:negativeData,borderColor:COLORS.red,backgroundColor:'rgba(255,74,106,0.15)',fill:'origin',yAxisID:'y',tension:0.3,pointRadius:0,borderWidth:1.5}
  ];
  if(hasPrice)ds.push({label:'SOL Price (USD)',data:priceData,borderColor:COLORS.sol,backgroundColor:'transparent',fill:false,yAxisID:'y1',tension:0.3,pointRadius:0,borderWidth:2});

  netFlowChart=new Chart(document.getElementById('netFlowChart').getContext('2d'),{
    type:'line',data:{labels:labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#6e6e88',boxWidth:10,padding:12,font:{size:10}}},
        tooltip:{backgroundColor:'rgba(10,10,10,0.95)',titleColor:'#e5e5e5',bodyColor:'#8a8a8a',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,cornerRadius:6,padding:10,
          callbacks:{label:function(context){if(context.datasetIndex===2)return'Price: $'+context.raw.toLocaleString();var idx=context.dataIndex;var actual=netFlowData[idx];return'Net Flow: '+(actual>=0?'+':'')+formatNumber(actual)+' SOL';},
            filter:function(tooltipItem){if(tooltipItem.datasetIndex===2)return true;return tooltipItem.datasetIndex===0?netFlowData[tooltipItem.dataIndex]>=0:netFlowData[tooltipItem.dataIndex]<0;}}}},
      scales:{x:{...baseScaleOpts,ticks:{...baseScaleOpts.ticks,color:'#555'}},
        y:{...baseScaleOpts,position:'left',
          grid:{color:function(context){return context.tick.value===0?'rgba(255,255,255,0.15)':gridColor;},lineWidth:function(context){return context.tick.value===0?2:1;}},
          ticks:{...baseScaleOpts.ticks,color:'#888',callback:function(val){return(val>=0?'+':'')+formatNumber(val);}},title:{display:true,text:'Net Flow (SOL)',color:'#888',font:{size:10}}},
        y1:{...baseScaleOpts,position:'right',grid:{drawOnChartArea:false},ticks:{...baseScaleOpts.ticks,color:COLORS.sol,callback:function(v){return'$'+v.toLocaleString();}},title:{display:true,text:'SOL Price (USD)',color:COLORS.sol,font:{size:10}}}}
    },
    plugins:[{id:'zeroLabel',afterDraw:function(chart){var y=chart.scales.y.getPixelForValue(0);var ctx=chart.ctx;ctx.save();ctx.fillStyle='rgba(66,255,140,0.35)';ctx.font='9px JetBrains Mono';ctx.fillText('순유입',chart.chartArea.right-30,y+12);ctx.fillStyle='rgba(255,74,106,0.35)';ctx.fillText('순유출',chart.chartArea.right-30,y-6);ctx.restore();}}]
  });
  sendHeight();
}

function setupTabs(containerId,callback){var c=document.getElementById(containerId);if(!c)return;c.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){c.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});t.classList.add('active');callback(t.dataset.range);});});}
setupTabs('flowTabs',function(r){flowRange=r;updateNetFlowChart();});

var _lastH=0,_ht;
function sendHeight(){clearTimeout(_ht);_ht=setTimeout(function(){var h=document.body.offsetHeight;if(Math.abs(h-_lastH)>5){_lastH=h;window.parent.postMessage({type:'resize',height:h},'*');}},150);}
window.addEventListener('resize',sendHeight);
window.addEventListener('load',function(){sendHeight();setTimeout(sendHeight,500);setTimeout(sendHeight,1500);});
new MutationObserver(sendHeight).observe(document.body,{childList:true,subtree:true});
window.addEventListener('message',function(e){if(e.data&&e.data.type==='requestResize'){_lastH=0;sendHeight();}});

loadData();
</script>
